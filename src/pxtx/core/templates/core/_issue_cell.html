{% comment %}Inline-editable status / priority / effort cell.

``editing`` flips the cell between a clickable badge (display) and a
<select> whose change event POSTs the new value back. The select itself
is rendered via the shared ``EnhancedSelect`` widget in the view so the
modal form, filter bar, and inline cells all share one source of truth —
any future ``choices-init.js`` change applies here without template churn.{% endcomment %}
{% if editing %}
<td class="edit-cell edit-cell-{{ field }} editing">{{ cell_select }}</td>
{% else %}
<td class="edit-cell edit-cell-{{ field }}"
    hx-get="{% url 'core:issue-cell' number=issue.number field=field %}"
    hx-trigger="click"
    hx-swap="outerHTML"
    title="Click to edit {{ field }}">
    {% if field == "status" %}<span class="badge status-{{ issue.status }}">{{ issue.get_status_display }}</span>
    {% elif field == "priority" %}<span class="prio prio-{{ issue.priority }}">{{ issue.get_priority_display }}</span>
    {% elif field == "effort" %}{% if issue.effort_minutes %}<span class="badge effort-{{ issue.effort_minutes }}">{{ issue.get_effort_minutes_display }}</span>{% else %}—{% endif %}{% endif %}
</td>
{% endif %}
