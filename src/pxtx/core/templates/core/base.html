{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}pxtx{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="site">
        <a class="brand" href="{% url 'core:issue-list' %}">pxtx</a>
        <a href="{% url 'core:issue-list' %}" {% if 'issues' in request.path %}class="active"{% endif %}>Issues</a>
        <a href="{% url 'core:milestone-list' %}" {% if 'milestones' in request.path %}class="active"{% endif %}>Releases</a>
        <span class="right">
            <span class="meta">{{ user.username }}</span>
            <form class="logout" method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        </span>
    </nav>
    {% endif %}
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
