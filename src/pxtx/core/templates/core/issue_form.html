{% extends "core/base.html" %}
{% block title %}{{ form_title }} – pxtx{% endblock %}
{% block content %}
<h1>{{ form_title }}</h1>

<form method="post" class="issue-form">
    {% include "core/_issue_form_body.html" %}

    <div class="form-actions">
        <button type="submit">{{ submit_label }}</button>
        {% if issue %}
        <a href="{{ issue.get_absolute_url }}" class="secondary">Cancel</a>
        {% else %}
        <a href="{% url 'core:issue-list' %}" class="secondary">Cancel</a>
        {% endif %}
    </div>
</form>
{% endblock %}
